  </defs>

  <g clip-path="url(#pill-clip)">
    <rect x="20" y="20" width="150" height="120" fill="url(#left-fill)" />
    <rect x="150" y="20" width="150" height="120" fill="url(#right-fill)" />
  </g>

  <rect x="20" y="20" width="280" height="120" rx="60" stroke="#111111" stroke-width="6" />
  <path
    d="M160 22C176 49 176 111 160 138"
