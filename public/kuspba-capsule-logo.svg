<svg width="320" height="160" viewBox="0 0 320 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="pill-clip">
      <rect x="20" y="20" width="280" height="120" rx="60" />
    </clipPath>
    <linearGradient id="left-fill" x1="20" y1="80" x2="160" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B4F0BF" />
      <stop offset="1" stop-color="#A3E7AE" />
    </linearGradient>
    <linearGradient id="right-fill" x1="160" y1="80" x2="300" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8E7E9" />
      <stop offset="1" stop-color="#A9DFE3" />
